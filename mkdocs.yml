site_name: Q-agent
site_description: Open-source workspace for quantitative finance research, QuantConnect strategy development, and reproducible trading analysis.
site_url: https://wolfpackofone.github.io/Q-agent/
repo_url: https://github.com/WolfpackOfOne/Q-agent
repo_name: WolfpackOfOne/Q-agent
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - LEAN & QuantConnect: getting-started.md
      - Running Notebooks: notebooks.md
  - Architecture: architecture.md
  - Research: research-examples.md
  - Project Map: project-map.md
  - Agent Workflows: agent-workflows.md
  - Contributing: contributing.md

extra_css:
  - stylesheets/extra.css
  - https://cdn.jsdelivr.net/npm/asciinema-player@3/dist/bundle/player.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/asciinema-player@3/dist/bundle/player.min.js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/WolfpackOfOne/Q-agent
